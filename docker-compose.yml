services:
  db:
    image: postgres:16-alpine
    container_name: gradfix-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gradfix
      POSTGRES_PASSWORD: gradfix
      POSTGRES_DB: gradfix
    ports:
      - "5432:5432"
    volumes:
      - gradfix-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gradfix"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: gradfix-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  gradfix-pgdata:
